version: "3.9"

services:
  backend:
    build: ./backend
    container_name: devbin-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/devbin.db
      - SECRET_KEY=change-this-to-a-random-secret-before-sharing # ← change this!
    volumes:
      - ./data:/data # SQLite DB persists here on your machine
    ports:
      - "8000:8000" # API accessible at http://localhost:8000

  frontend:
    build: ./frontend
    container_name: devbin-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # App accessible at http://localhost:3000
    depends_on:
      - backend
